experiences:
  title: Experience
  info:
  - role: Senior Technical Writer
    time: 2025 - Present
    company: Metron Aviation, Remote
    details: |
      Owned content development end-to-end across 4+ concurrent user guides, managing ideation, SME
      collaboration, publication, and post-launch feedback cycles with 960% on-time delivery.
      Initiated use of local LLM AI-assisted drafts and content in documentation workflows, reducing
      average time to first draft by 40% on high-priority customer content. Built 5+ Python and VBA
      automation scripts to streamline documentation workflows, reducing technical review cycles by
      30% and enabling same-day turnaround on high-priority content updates.

      **Tools & Tech:** MkDocs, VS Code, Python, Markdown, Ollama, Git/GitHub, Agile/Kanban.
#        - Bullet point
#       - Bullet point
  - role: Senior Technical Writer
    time: June - October 2024 (short-term project)
    company: Microsoft, Remote
    details: |
      Expanded and updated technical content in 200+ datasheets and 75+ delivery guides (SOPs,
      implementation procedures, troubleshooting workflows) to support global customer delivery teams.
      Improved Section 508 accessibility compliance in each datasheet by adding and updating alt-text
      for 500+ images and tables.

      **Tools & Tech:** Azure DevOps, Word, PowerPoint, Agile/Kanban.
  - role: Senior Technical Writer
    time: October 2023 - June 2024
    company: Brightspot, Remote
    details: |
      Reduced support tickets from approximately 45 to 20 monthly, and onboarding time by 20% through
      development of 25+ technical references, SDK tutorials, and troubleshooting guides.
      Cut developer onboarding time by 20% by creating plain-English explanations of complex APIs.

      **Tools & Tech:** Java, GraphQL, Git, VS Code, Docker, Linux, Jira.
  - role: Senior Technical Writer
    time: February 2020 - July 2023
    company: WALGREENS CLOUD PLATFORM, CISCO, TEXAS MUTUAL INSURANCE CO., Remote
    details: |
      Authored 30+ REST API references, changelog entries, and deployment SOPs using OpenAPI and
      Postman-validated examples, enabling developers to onboard without requiring additional support
      resources (COMPANY-4). Designed and deployed a CI/CD documentation pipeline using Git workflows
      and automated builds across 20+ repositories, reducing time-to-publish for content updates by
      33% (COMPANY-5). Created operational runbooks and quick-reference job aids in collaboration
      with engineers and SMEs, enabling consistent process execution across distributed teams.

      **Tools & Tech:** OpenAPI (JSON), Postman, Swagger, Python, Java, Markdown, Git, VS Code,
      CI/CD pipelines, Agile/Scrum.
  - role: PRODUCT DELIVERY & SUPPORT MANAGER
    time: May-September 2019
    company: HEALTH & HUMAN SERVICES COMMISSION (STATE OF TEXAS), Austin, TX
    details: |
      Developed comprehensive runbooks that resolved critical gaps in troubleshooting documentation,
      reducing production incident resolution time by 40% (from 4.0 to 2.4 hours average).
      Led 3+ end-to-end software projects from requirements gathering through deployment.

      **Tools & Tech:** PeopleSoft HCM, Visio, MS SharePoint, MS Office Suite, Google Analytics,
      Agile/Kanban.
  - role: QA Automation Engineer
    time: 2010-2015
    company: STATE STREET BANK CORP., CHARLES SCHWAB, IBM, Austin, TX
    details: |
      Designed automated scripts executed via command-line tooling for build verification and
      regression tests that reduced regression cycle time by 25%.

      **Tools & Tech:** Selenium, Java, Agile/Scrum.

